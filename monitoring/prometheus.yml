# Prometheus scrape config for the inference server.
# Mounted by compose.yaml when the `monitoring` profile is active.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    service: torch-inference

scrape_configs:
  - job_name: torch-inference
    metrics_path: /metrics
    static_configs:
      - targets: [inference:8000]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
