# Pre-commit hooks for the Rust torch-inference server.
# Install once with `pre-commit install`. Then `cargo fmt`, `cargo clippy`,
# `cargo test` (sanity subset), and a few generic file checks run on every
# commit. CI in `.github/workflows/ci.yml` enforces the full suite.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(lcov\.info|tarpaulin-report\.json|.*\.lock|src/api/playground\.html)$
      - id: end-of-file-fixer
        exclude: ^(lcov\.info|tarpaulin-report\.json|.*\.lock)$
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1500']
      - id: detect-private-key

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --all-targets --no-default-features --features production -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
