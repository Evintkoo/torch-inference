# Nginx reverse proxy in front of the torch-inference server.
# Used by compose.prod.yaml; safe defaults for one-host deployments.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100m;

    # Logging
    log_format json_combined escape=json
        '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
        '"path":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
        '"referer":"$http_referer","ua":"$http_user_agent",'
        '"upstream_time":"$upstream_response_time","request_time":$request_time}';
    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # Compression — JSON / SSE benefit, raw audio does not.
    gzip on;
    gzip_types application/json text/plain text/event-stream text/css application/javascript;
    gzip_min_length 256;

    upstream inference_backend {
        server inference:8000;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health/readiness/liveness — pass through, never throttled.
        location ~ ^/health(/.*)?$ {
            proxy_pass http://inference_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Streaming endpoints (SSE / chunked WAV / WS) — disable buffering and
        # extend timeouts so chunks are flushed promptly.
        location ~ ^/(tts/stream|dashboard/stream|classify/stream|llm/.*)$ {
            proxy_pass http://inference_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
            chunked_transfer_encoding on;
        }

        # WebSocket upgrade for /audio/ws and /ws/*.
        location ~ ^/(audio/ws|ws/.*)$ {
            proxy_pass http://inference_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        # Default — JSON API.
        location / {
            proxy_pass http://inference_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }
    }
}
